{% extends "base.html" %}
{% block content %}
<style>

body {
    font-family: Arial, sans-serif;
    background-color: #f4f6f9;
    margin: 0;
    padding: 0;
}

h2 {
    text-align: center;
    color: #333;
    margin-top: 20px;
    font-size: 28px;
}

.course-card {
    background: #fff;
    border: 1px solid #ddd;
    border-radius: 8px;
    padding: 20px;
    margin: 20px auto;
    width: 80%;
    max-width: 600px;
    box-shadow: 0 4px 6px rgba(0,0,0,0.1);
    transition: transform 0.2s ease, box-shadow 0.2s ease;
}

.course-card:hover {
    transform: translateY(-5px);
    box-shadow: 0 6px 12px rgba(0,0,0,0.15);
}

.course-title {
    font-weight: bold;
    font-size: 20px;
    color: #2c3e50;
    margin-bottom: 10px;
}

.course-description {
    font-size: 16px;
    color: #555;
    margin-bottom: 15px;
}

.join-btn {
    display: inline-block;
    text-decoration: none;
    background-color: #3498db;
    color: #fff;
    padding: 10px 16px;
    border-radius: 5px;
    font-size: 14px;
    transition: background-color 0.3s ease;
}

.join-btn:hover {
    background-color: #2980b9;
}

.empty-message {
    text-align: center;
    font-size: 18px;
    color: #888;
    margin-top: 40px;
}
</style>
{% for course in courses %}
    <div class="course-card">
        <p class="course-title">{{ course.title }}</p>
        <p class="course-description">{{ course.description }}</p>
        <a class="join-btn" href="{% url 'enroll_course' course.id %}">Join Course</a>
    </div>
{% empty %}
    <p class="empty-message">No courses available!</p>
{% endfor %}
{% endblock content %}
