
<!DOCTYPE html>
 <html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduMind</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: Arial, Helvetica, sans-serif;
            background-color: #f4f6f9;
            color: #333;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }
        header {
            background-color: #2c3e50;
            color: #fff;
            padding: 20px;
            text-align: center;
        }
        header h1 { font-size: 2rem; letter-spacing: 2px; }
        footer {
            background-color: #2c3e50;
            color: #fff;
            text-align: center;
            padding: 15px;
            margin-top: auto;
            font-size: 0.9rem;
        }
        main { flex: 1; padding: 40px; text-align: center; }
    </style>
</head>
<body>
    <header>
        <h1>EduMind</h1>
    </header>

    <main>
        {% block content %}
        {% endblock %}
    </main>

    <footer>
        <p>&copy; 2026 EduMind. All rights reserved.</p>
    </footer>
</body>
</html>
