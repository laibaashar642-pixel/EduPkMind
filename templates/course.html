{% extends "base.html" %}
{% block content %}
<style>

/* General page styling */
body {
    font-family: Arial, sans-serif;
    background: #f4f6f9;
    margin: 0;
    padding: 0;
}

/* Centered container */
form {
    max-width: 500px;
    margin: 40px auto;
    padding: 20px;
    background: #ffffff;
    border-radius: 8px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.1);
}

/* Heading */
h2 {
    text-align: center;
    color: #333;
    margin-bottom: 20px;
}

/* Input fields */
input[type="text"],
textarea {
    width: 100%;
    padding: 12px;
    margin: 10px 0 20px 0;
    border: 1px solid #ccc;
    border-radius: 6px;
    font-size: 14px;
    transition: border-color 0.3s ease;
}

/* Focus effect */
input[type="text"]:focus,
textarea:focus {
    border-color: #007bff;
    outline: none;
}

/* Button styling */
button {
    width: 100%;
    padding: 12px;
    background: #007bff;
    color: #fff;
    border: none;
    border-radius: 6px;
    font-size: 16px;
    cursor: pointer;
    transition: background 0.3s ease;
}

/* Hover effect */
button:hover {
    background: #0056b3;
}

/* Responsive tweaks */
@media (max-width: 600px) {
    form {
        margin: 20px;
        padding: 15px;
    }
}

</style>

<h2>Add New Course</h2>

<form method="POST">
    {% csrf_token %}
    <input type="text" name="title" placeholder="Course Title">
    <textarea name="description" placeholder="Description"></textarea>
    <button type="submit">Add Course</button>
</form>

{% endblock content %}
