{% extends "base.html" %}
{% block content %}
<style>
    /* styles.css */

/* General page background */
html, body {
  height: 100%;
  background-color: #111827; /* Tailwind's gray-900 */
  font-family: system-ui, sans-serif;
}

/* Container */
.container {
  display: flex;
  min-height: 100%;
  flex-direction: column;
  justify-content: center;
  padding: 3rem 1.5rem;
}

/* Logo */
.logo {
  display: block;
  margin: 0 auto;
  height: 40px;
  width: auto;
}

/* Headings */
h2 {
  margin-top: 2.5rem;
  text-align: center;
  font-size: 1.5rem;
  font-weight: bold;
  letter-spacing: -0.01em;
  color: #ffffff;
}

/* Form */
form {
  margin-top: 2.5rem;
  display: flex;
  flex-direction: column;
  gap: 1.5rem;
}

/* Labels */
label {
  display: block;
  font-size: 0.875rem;
  font-weight: 500;
  color: #f3f4f6; /* gray-100 */
}

/* Inputs */
input {
  width: 100%;
  border-radius: 0.375rem;
  background-color: rgba(255, 255, 255, 0.05);
  padding: 0.375rem 0.75rem;
  font-size: 1rem;
  color: #ffffff;
  outline: none;
  border: 1px solid rgba(255, 255, 255, 0.1);
}

input::placeholder {
  color: #6b7280; /* gray-500 */
}

input:focus {
  border-color: #6366f1; /* indigo-500 */
  box-shadow: 0 0 0 2px #6366f1;
}

/* Links */
a {
  font-weight: 600;
  color: #818cf8; /* indigo-400 */
  text-decoration: none;
}

a:hover {
  color: #a5b4fc; /* indigo-300 */
}

/* Button */
button {
  display: flex;
  justify-content: center;
  width: 100%;
  border-radius: 0.375rem;
  background-color: #6366f1; /* indigo-500 */
  padding: 0.375rem 0.75rem;
  font-size: 0.875rem;
  font-weight: 600;
  color: #ffffff;
  border: none;
  cursor: pointer;
}

button:hover {
  background-color: #818cf8; /* indigo-400 */
}

button:focus {
  outline: 2px solid #6366f1;
  outline-offset: 2px;
}

/* Footer text */
.footer-text {
  margin-top: 2.5rem;
  text-align: center;
  font-size: 0.875rem;
  color: #9ca3af; /* gray-400 */
}
</style>
 <html class="h-full bg-gray-900">
  <body class="h-full">
 
<div class="flex min-h-full flex-col justify-center px-6 py-12 lg:px-8">
  <div class="sm:mx-auto sm:w-full sm:max-w-sm">

    <h2 class="mt-10 text-center text-2xl/9 font-bold tracking-tight text-white">Sign-Up</h2>
  </div>

  <div class="mt-10 sm:mx-auto sm:w-full sm:max-w-sm">
    <form action="#" method="POST" class="space-y-6">
      {% csrf_token %}
      <div>
        <label for="username" class="block text-sm/6 font-medium text-gray-100">Username</label>
        <div class="mt-2">
          <input id="username" type="text" name="username" required autocomplete="username" class="block w-full rounded-md bg-white/5 px-3 py-1.5 text-base text-white outline-1 -outline-offset-1 outline-white/10 placeholder:text-gray-500 focus:outline-2 focus:-outline-offset-2 focus:outline-indigo-500 sm:text-sm/6" />
        </div>
      </div>
      <div>
        <label for="email" class="block text-sm/6 font-medium text-gray-100">Email address</label>
        <div class="mt-2">
          <input id="email" type="email" name="email" required autocomplete="email" class="block w-full rounded-md bg-white/5 px-3 py-1.5 text-base text-white outline-1 -outline-offset-1 outline-white/10 placeholder:text-gray-500 focus:outline-2 focus:-outline-offset-2 focus:outline-indigo-500 sm:text-sm/6" />
        </div>
      </div>

      <div>
        <div class="flex items-center justify-between">
          <label for="password" class="block text-sm/6 font-medium text-gray-100">Password</label>
          <div class="text-sm">
            <a href="#" class="font-semibold text-indigo-400 hover:text-indigo-300">Forgot password?</a>
          </div>
        </div>
        <div class="mt-2">
          <input id="password" type="password" name="password" required autocomplete="current-password" class="block w-full rounded-md bg-white/5 px-3 py-1.5 text-base text-white outline-1 -outline-offset-1 outline-white/10 placeholder:text-gray-500 focus:outline-2 focus:-outline-offset-2 focus:outline-indigo-500 sm:text-sm/6" />
        </div>
      </div>
         <select name="role">
            <option value="student">Student</option>
            <option value="teacher">Teacher</option>
        </select>
      <div>
        <button type="submit" class="flex w-full justify-center rounded-md bg-indigo-500 px-3 py-1.5 text-sm/6 font-semibold text-white hover:bg-indigo-400 focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-indigo-500">Sign in</button>
      </div>
    </form>

    <p class="mt-10 text-center text-sm/6 text-gray-400">
      Not a member?
      
  </div>
</div>
{% endblock content %}
