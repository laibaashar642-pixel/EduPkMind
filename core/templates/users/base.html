
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>This is my sign-up page</title>
    <style>
/* Reset some default styles */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

/* Body styling */
body {
    font-family: Arial, Helvetica, sans-serif;
    background-color: #f4f6f9;
    color: #333;
    line-height: 1.6;
    display: flex;
    flex-direction: column;
    min-height: 100vh;
}

/* Header styling */
header {
    background-color: #2c3e50;
    color: #fff;
    padding: 20px;
    text-align: center;
}

header h1 {
    font-size: 2rem;
    letter-spacing: 2px;
}

/* Footer styling */
footer {
    background-color: #2c3e50;
    color: #fff;
    text-align: center;
    padding: 15px;
    margin-top: auto; /* pushes footer to bottom */
    font-size: 0.9rem;
}

/* Block content area */

main {
    flex: 1;
    padding: 40px;
    text-align: center;
}

    </style>
</head>
<body>
    {% block content %}
    <header>
    <h1>EduMind</h1>  
    </header>
    
    <footer>
        <p>&copy; 2026 EduMind. All rights reserved.</p>
    </footer>
    {% endblock  %}
</body>
</html>
