{% extends "base.html" %}
{% block content %}
<style>


/* login.css */

/* General body styling */
body {
  font-family: 'Inter', sans-serif;
  background-color: #f9fafb;
  margin: 0;
  padding: 0;
}

/* Container */
.container {
  max-width: 480px;
  width: 100%;
  margin: 0 auto;
  padding: 1rem;
}

/* Card */
.card {
  background-color: #fff;
  border: 1px solid #e5e7eb; /* Tailwind gray-200 */
  border-radius: 1rem;
  padding: 1.5rem;
  box-shadow: 0 1px 2px rgba(0,0,0,0.05);
}

/* Inputs */
input {
  width: 100%;
  border: 1px solid #d1d5db;
  padding: 0.75rem 1rem;
  border-radius: 0.375rem;
  font-size: 0.875rem;
  color: #1f2937;
}

input:focus {
  border-color: #2563eb;
  box-shadow: 0 0 0 2px rgba(37, 99, 235, 0.3);
  outline: none;
}

/* Buttons */
button {
  width: 100%;
  padding: 0.75rem 1rem;
  font-size: 0.9375rem;
  font-weight: 500;
  border-radius: 0.375rem;
  color: #fff;
  background-color: #2563eb;
  cursor: pointer;
  transition: background-color 0.2s ease-in-out;
}

button:hover {
  background-color: #1d4ed8;
}

/* Links */
a {
  color: #2563eb;
  font-weight: 600;
  text-decoration: none;
}

a:hover {
  text-decoration: underline;
}

/* Responsive tweaks */
@media (max-width: 640px) {
  .card {
    padding: 1rem;
  }

  h1 {
    font-size: 2rem;
  }

  input, button {
    font-size: 0.875rem;
    padding: 0.5rem 0.75rem;
  }

  .flex-wrap {
    flex-direction: column;
    align-items: flex-start;
    gap: 0.5rem;
  }
}

@media (max-width: 400px) {
  h1 {
    font-size: 1.5rem;
  }

  .container {
    padding: 0.5rem;
  }
}


</style>
<div class="bg-gray-50">
      <div class="min-h-screen flex flex-col items-center justify-center py-6 px-4">
        <div class="max-w-[480px] w-full">
         

          <div class="p-6 sm:p-8 rounded-2xl bg-white border border-gray-200 shadow-sm">
            
            
                <form method="POST" action="{% url 'login' %}" class="mt-12 space-y-6">
                    {% csrf_token %}
              <div>
                <label class="text-slate-900 text-sm font-medium mb-2 block">User name</label>
                <div class="relative flex items-center">
                  <input name="username" type="text" required class="w-full text-slate-900 text-sm border border-slate-300 px-4 py-3 pr-8 rounded-md outline-blue-600" placeholder="Enter user name" />
                  
                   
                </div>
              </div>
              <div>
                <label class="text-slate-900 text-sm font-medium mb-2 block">Password</label>
                <div class="relative flex items-center">
                  <input name="password" type="password" required class="w-full text-slate-900 text-sm border border-slate-300 px-4 py-3 pr-8 rounded-md outline-blue-600" placeholder="Enter password" />
                 
                </div>
              </div>
              <div class="flex flex-wrap items-center justify-between gap-4">
                <div class="flex items-center">
                  <input id="remember-me" name="remember-me" type="checkbox" class="h-4 w-4 shrink-0 text-blue-600 focus:ring-blue-500 border-slate-300 rounded" />
                  <label for="remember-me" class="ml-3 block text-sm text-slate-900">
                    Remember me!
                  </label>
                </div>
                <div class="text-sm">
                  <a href="javascript:void(0);" class="text-blue-600 hover:underline font-semibold">
                    Forgot your password?
                  </a>
                </div>
              </div>

              <div class="!mt-12">
                <button type="submit" class="w-full py-2 px-4 text-[15px] font-medium tracking-wide rounded-md text-white bg-blue-600 hover:bg-blue-700 focus:outline-none cursor-pointer">
                  Login page
                </button>
              </div>
              <p class="text-slate-900 text-sm !mt-6 text-center">Don't have an account? <a href="javascript:void(0);" class="text-blue-600 hover:underline ml-1 whitespace-nowrap font-semibold">Register here</a></p>
            </form>
          </div>
        </div>
      </div>
    </div>
    {% endblock content %}
